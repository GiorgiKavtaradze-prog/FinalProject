name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore FinalProject/FinalProject.slnx

    - name: Build
      run: dotnet build FinalProject/FinalProject.slnx --no-restore

    - name: Test
      run: dotnet test FinalProject/FinalProjectApp.Tests/FinalProjectApp.Tests.csproj --no-build --verbosity normal || true

    - name: Publish
      run: dotnet publish FinalProject/FinalProjectApp/FinalProjectApp.csproj -c Release -o ./publish

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t atm-simulator:latest .

    - name: Push to GitHub Container Registry
      run: |
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker tag atm-simulator ghcr.io/${{ github.repository_owner }}/atm-simulator:latest
        docker push ghcr.io/${{ github.repository_owner }}/atm-simulator:latest
        docker tag atm-simulator ghcr.io/${{ github.repository_owner | lower }}/atm-simulator:latest
        docker push ghcr.io/${{ github.repository_owner | lower }}/atm-simulator:latest
