name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      working-directory: ./FinalProject
      run: dotnet restore

    - name: Build
      working-directory: ./FinalProject
      run: dotnet build --no-restore

    - name: Test
      working-directory: ./FinalProject
      run: dotnet test FinalProjectApp.Tests/FinalProjectApp.Tests.csproj --no-build --verbosity normal || true

    - name: Publish
      working-directory: ./FinalProject
      run: dotnet publish FinalProjectApp/FinalProjectApp.csproj -c Release -o ../publish

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t atm-simulator .

    - name: Push to GitHub Container Registry
      run: |
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker tag atm-simulator ghcr.io/${{ github.repository }}/atm-simulator:latest
        docker push ghcr.io/${{ github.repository }}/atm-simulator:latest
